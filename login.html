<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotidiano Fragrance — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>

        /* =====================
           RESET & VARIABLES
        ===================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --black:    #111111;
            --white:    #ffffff;
            --gray-100: #f5f5f5;
            --gray-200: #e8e8e8;
            --gray-400: #aaaaaa;
            --gray-600: #666666;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body:    'DM Sans', system-ui, sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: var(--white);
            color: var(--black);
            -webkit-font-smoothing: antialiased;
        }

        a { text-decoration: none; color: inherit; }


        /* =====================
           LOGO — fixed center top
           Stays in place regardless of form height
        ===================== */
        .login-logo {
            position: fixed;
            top: 36px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .login-logo img {
            height: 42px;
            width: auto;
            display: block;
        }


        /* =====================
           PAGE LAYOUT
           Starts below the fixed logo, grows downward
        ===================== */
        .login-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 140px 24px 72px;
        }


        /* =====================
           FORM CARD
        ===================== */
        .login-card {
            width: 100%;
            max-width: 500px;
        }

        /* Form header */
        .form-header {
            margin-bottom: 36px;
            text-align: center;
        }

        .form-header h1 {
            font-family: var(--font-display);
            font-size: 42px;
            font-weight: 500;
            color: var(--black);
            letter-spacing: -0.01em;
            margin-bottom: 10px;
        }

        .form-header p {
            font-size: 15px;
            color: var(--gray-600);
            line-height: 1.6;
        }


        /* =====================
           TABS
        ===================== */
        .form-tabs {
            display: flex;
            justify-content: center;
            border-bottom: 1px solid var(--gray-200);
            margin-bottom: 36px;
        }

        .form-tab {
            font-size: 13px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding-bottom: 14px;
            margin: 0 20px;
            color: var(--gray-400);
            cursor: pointer;
            border-bottom: 1px solid transparent;
            margin-bottom: -1px;
            transition: color 0.2s, border-color 0.2s;
            user-select: none;
        }

        .form-tab.active {
            color: var(--black);
            border-bottom-color: var(--black);
        }

        .form-tab:hover { color: var(--black); }


        /* =====================
           FORM PANELS
           Both panels stay in the DOM at all times.
           The inactive one is hidden with visibility so
           it does NOT contribute to layout height —
           only the active panel pushes the page down.
           This means switching tabs only ever EXTENDS
           the page downward, never jumps content up.
        ===================== */
        .form-panels {
            position: relative;
        }

        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
        }


        /* =====================
           FORM FIELDS
        ===================== */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
        }

        .form-group label {
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gray-600);
        }

        .form-group input {
            font-family: var(--font-body);
            height: 50px;
            border: 1px solid var(--gray-200);
            border-radius: 2px;
            background: var(--gray-100);
            padding: 0 16px;
            font-size: 15px;
            color: var(--black);
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            width: 100%;
        }

        .form-group input:focus {
            border-color: var(--black);
            background: var(--white);
        }


        /* =====================
           SUBMIT BUTTON
        ===================== */
        .form-btn {
            width: 100%;
            height: 52px;
            background: var(--black);
            color: var(--white);
            border: none;
            border-radius: 2px;
            font-family: var(--font-body);
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
            margin-bottom: 32px;
        }

        .form-btn:hover { opacity: 0.82; }


        /* =====================
           OR DIVIDER
        ===================== */
        .form-divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }

        .form-divider-line {
            flex: 1;
            height: 1px;
            background: var(--gray-200);
        }

        .form-divider-text {
            font-size: 11px;
            color: var(--gray-400);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }


        /* =====================
           SWITCH LINK
        ===================== */
        .form-switch {
            text-align: center;
            font-size: 13px;
            color: var(--gray-600);
        }

        .form-switch a {
            color: var(--black);
            border-bottom: 1px solid var(--black);
            padding-bottom: 1px;
            transition: opacity 0.2s;
        }

        .form-switch a:hover { opacity: 0.6; }


        /* =====================
           ERROR MESSAGE
        ===================== */
        .form-error {
            display: none;
            font-size: 13px;
            color: #cc0000;
            background: #fff5f5;
            border: 1px solid #ffd0d0;
            border-radius: 2px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }

        .form-error.visible { display: block; }

    </style>
</head>
<body>

    <!-- =====================
         LOGO — fixed center top
    ===================== -->
    <div class="login-logo">
        <a href="index.html">
            <img src="assets/images/cotidiano_logo.png" alt="Cotidiano Fragrance">
        </a>
    </div>


    <!-- =====================
         PAGE
    ===================== -->
    <div class="login-page">
        <div class="login-card">

            <div class="form-header">
                <h1>Welcome back</h1>
                <p>Sign in to your account to continue shopping.</p>
            </div>

            <!-- Tabs -->
            <div class="form-tabs" id="form-tabs">
                <div class="form-tab active" data-tab="signin">Sign In</div>
                <div class="form-tab"        data-tab="register">Register</div>
            </div>

            <div class="form-panels">

                <!-- =====================
                     SIGN IN FORM
                ===================== -->
                <div class="form-panel active" id="panel-signin">

                    <div class="form-error" id="signin-error"></div>

                    <div class="form-group">
                        <label for="signin-email">Email address</label>
                        <input
                            type="email"
                            id="signin-email"
                            placeholder="you@email.com"
                            autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="signin-password">Password</label>
                        <input
                            type="password"
                            id="signin-password"
                            placeholder="••••••••"
                            autocomplete="current-password">
                    </div>

                    <button class="form-btn" id="signin-btn">Sign In</button>

                    <div class="form-divider">
                        <div class="form-divider-line"></div>
                        <div class="form-divider-text">or</div>
                        <div class="form-divider-line"></div>
                    </div>

                    <p class="form-switch">
                        Don't have an account? <a href="#" data-switch="register">Create one</a>
                    </p>

                </div>


                <!-- =====================
                     REGISTER FORM
                ===================== -->
                <div class="form-panel" id="panel-register">

                    <div class="form-error" id="register-error"></div>

                    <div class="form-group">
                        <label for="reg-name">Full name</label>
                        <input
                            type="text"
                            id="reg-name"
                            placeholder="Juan Dela Cruz"
                            autocomplete="name">
                    </div>

                    <div class="form-group">
                        <label for="reg-email">Email address</label>
                        <input
                            type="email"
                            id="reg-email"
                            placeholder="you@email.com"
                            autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input
                            type="password"
                            id="reg-password"
                            placeholder="••••••••"
                            autocomplete="new-password">
                    </div>

                    <div class="form-group">
                        <label for="reg-confirm">Confirm password</label>
                        <input
                            type="password"
                            id="reg-confirm"
                            placeholder="••••••••"
                            autocomplete="new-password">
                    </div>

                    <button class="form-btn" id="register-btn">Create Account</button>

                    <div class="form-divider">
                        <div class="form-divider-line"></div>
                        <div class="form-divider-text">or</div>
                        <div class="form-divider-line"></div>
                    </div>

                    <p class="form-switch">
                        Already have an account? <a href="#" data-switch="signin">Sign in</a>
                    </p>

                </div>

            </div>
        </div>
    </div>


    <script>
        // ================================================================
        // TAB SWITCHING — Sign In / Register
        // ================================================================
        document.getElementById("form-tabs").addEventListener("click", (e) => {
            const tab = e.target.closest(".form-tab");
            if (!tab) return;
            switchTab(tab.dataset.tab);
        });

        document.querySelectorAll("[data-switch]").forEach(link => {
            link.addEventListener("click", (e) => {
                e.preventDefault();
                switchTab(link.dataset.switch);
            });
        });

        function switchTab(name) {
            document.querySelectorAll(".form-tab").forEach(t =>
                t.classList.toggle("active", t.dataset.tab === name));
            document.querySelectorAll(".form-panel").forEach(p =>
                p.classList.toggle("active", p.id === `panel-${name}`));
        }


        // ================================================================
        // SIGN IN
        // ----------------------------------------------------------------
        // TODO (Backend team): Replace the contents of handleSignIn() with
        // a fetch() POST to your auth API endpoint.
        //
        // Example replacement:
        //   const res = await fetch('/api/auth/login', {
        //       method: 'POST',
        //       headers: { 'Content-Type': 'application/json' },
        //       body: JSON.stringify({ email, password })
        //   });
        //   if (res.ok) {
        //       window.location.href = 'index.html';
        //   } else {
        //       showError('signin-error', 'Incorrect email or password.');
        //   }
        // ================================================================
        document.getElementById("signin-btn").addEventListener("click", handleSignIn);

        function handleSignIn() {
            const email    = document.getElementById("signin-email").value.trim();
            const password = document.getElementById("signin-password").value;

            if (!email || !password) {
                showError("signin-error", "Please enter your email and password.");
                return;
            }

            hideError("signin-error");

            // ----------------------------------------------------------------
            // TEST USER — remove this block once backend auth is implemented
            // ----------------------------------------------------------------
            if (email === "testuser@email.com" && password === "testuser") {
                localStorage.setItem("user", JSON.stringify({
                    name:  "Test User",
                    email: "testuser@email.com"
                }));
                window.location.href = "index.html";
                return;
            }

            // ----------------------------------------------------------------
            // ADMIN ACCOUNT — remove this block once backend auth is implemented
            // ----------------------------------------------------------------
            if (email === "admin@cotidiano.com" && password === "admin123") {
                localStorage.setItem("user", JSON.stringify({
                    name:    "Admin",
                    email:   "admin@cotidiano.com",
                    isAdmin: true
                }));
                window.location.href = "admin.html";
                return;
            }

            // ----------------------------------------------------------------
            // TODO (Backend team): Replace with your fetch() POST call.
            // On success, save the returned user object to localStorage and
            // redirect to index.html.
            //
            // Example:
            //   const res = await fetch('/api/auth/login', {
            //       method: 'POST',
            //       headers: { 'Content-Type': 'application/json' },
            //       body: JSON.stringify({ email, password })
            //   });
            //   if (res.ok) {
            //       const user = await res.json();
            //       localStorage.setItem('user', JSON.stringify(user));
            //       window.location.href = 'index.html';
            //   } else {
            //       showError('signin-error', 'Incorrect email or password.');
            //   }
            // ----------------------------------------------------------------
            showError("signin-error", "Incorrect email or password.");
        }


        // ================================================================
        // REGISTER
        // ----------------------------------------------------------------
        // TODO (Backend team): Replace the contents of handleRegister()
        // with a fetch() POST to your registration API endpoint.
        //
        // Example replacement:
        //   const res = await fetch('/api/auth/register', {
        //       method: 'POST',
        //       headers: { 'Content-Type': 'application/json' },
        //       body: JSON.stringify({ name, email, password })
        //   });
        //   if (res.ok) {
        //       window.location.href = 'index.html';
        //   } else {
        //       showError('register-error', 'Something went wrong. Please try again.');
        //   }
        // ================================================================
        document.getElementById("register-btn").addEventListener("click", handleRegister);

        function handleRegister() {
            const name     = document.getElementById("reg-name").value.trim();
            const email    = document.getElementById("reg-email").value.trim();
            const password = document.getElementById("reg-password").value;
            const confirm  = document.getElementById("reg-confirm").value;

            if (!name || !email || !password || !confirm) {
                showError("register-error", "Please fill in all fields to continue.");
                return;
            }

            if (password !== confirm) {
                showError("register-error", "Passwords do not match.");
                return;
            }

            if (password.length < 8) {
                showError("register-error", "Password must be at least 8 characters.");
                return;
            }

            hideError("register-error");

            // TODO: replace with your fetch() call
            console.log("Register payload:", { name, email, password });
            alert("Registration submitted. Wire up your API here.");
        }


        // ================================================================
        // HELPERS
        // ================================================================
        function showError(id, message) {
            const el = document.getElementById(id);
            el.textContent = message;
            el.classList.add("visible");
        }

        function hideError(id) {
            document.getElementById(id).classList.remove("visible");
        }
    </script>

</body>
</html>
